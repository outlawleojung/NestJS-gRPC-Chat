services:
  nats:
    image: nats:2.10-alpine
    container_name: nestjs-grpc-chat-nats
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    command: ["-js", "-m", "8222"]

  redis:
    image: redis:7-alpine
    container_name: nestjs-grpc-chat-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: nestjs-grpc-chat-postgres
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
